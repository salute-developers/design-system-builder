services:

  # DS Registry API
  ds-registry:
    build:
      context: ./services/ds-registry
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3008
    ports:
      - "3008:3008"

  # Admin Panel for DS Registry
  admin:
    build:
      context: ./apps/admin
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "3004:5173"
    depends_on:
      - ds-registry

  # Client Application
  client:
    build:
      context: ./apps/client
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "3002:4173"
    depends_on:
      - ds-registry

  # Generator web library
  generator:
    build:
      context: ./services/ds-generator
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      NODE_ENV: development
    ports:
      - "3005:3005"
    depends_on:
      - ds-registry

  # Publisher service
  publisher:
    build:
      context: ./services/publisher
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      NODE_ENV: development
      PORT: 3007
    ports:
      - "3007:3007"

  # Documentation Generator Service
  docs-generator:
    build:
      context: ./services/ds-documentation-generator
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      NODE_ENV: development
      PORT: 3006
    ports:
      - "3006:3006"
    depends_on:
      - ds-registry
    volumes:
      - docs_output:/home/node/app/output
    command: npm run start:dev

volumes:
  docs_output:
    driver: local

