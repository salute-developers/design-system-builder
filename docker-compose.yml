services:

  # DB Service API
  db-service:
    build:
      context: ./services/db-service
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3008
    ports:
      - "3008:3008"

  # Admin Panel for DB Service
  admin:
    build:
      context: ./apps/admin
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "3004:5173"
    depends_on:
      - db-service

  # Client Application
  client:
    build:
      context: ./apps/client
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "3002:4173"
    depends_on:
      - db-service

  # Generator web library
  generator:
    build:
      context: ./services/generator
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      NODE_ENV: development
    ports:
      - "3005:3005"
    depends_on:
      - db-service

  # Publisher service
  publisher:
    build:
      context: ./services/publisher
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      NODE_ENV: development
      PORT: 3007
    ports:
      - "3007:3007"

  # Documentation Generator Service
  docs-generator:
    build:
      context: ./services/documentation-generator
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      NODE_ENV: development
      PORT: 3006
    ports:
      - "3006:3006"
    depends_on:
      - db-service
    volumes:
      - docs_output:/home/node/app/output
    command: npm run start:dev

volumes:
  docs_output:
    driver: local

