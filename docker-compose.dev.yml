services:
  # PostgreSQL Database (ds-registry)
  postgres-registry:
    image: postgres:16-alpine
    container_name: ds-registry-postgres-dev
    restart: unless-stopped
    environment:
      POSTGRES_DB: ds_registry
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - postgres_registry_data_dev:/var/lib/postgresql/data
    networks:
      - ds-builder-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d ds_registry"]
      interval: 10s
      timeout: 5s
      retries: 5

  # DS Registry API (Development)
  ds-registry:
    build:
      context: ./services/ds-registry
      dockerfile: Dockerfile.dev
    container_name: ds-registry-dev
    restart: unless-stopped
    environment:
      NODE_ENV: development
      PORT: 3008
      ZAI_API_KEY: ${ZAI_API_KEY}
      DATABASE_URL: postgresql://postgres:postgres@postgres-registry:5432/ds_registry
    ports:
      - "3008:3008"
    depends_on:
      postgres-registry:
        condition: service_healthy
    networks:
      - ds-builder-network
    volumes:
      - ./services/ds-registry:/home/node/app
      - /home/node/app/node_modules

  # Admin Panel for DS Registry (Development)
  admin:
    build:
      context: ./apps/admin
      dockerfile: Dockerfile.dev
    container_name: ds-builder-admin-dev
    restart: unless-stopped
    environment:
      VITE_DS_REGISTRY_API: http://localhost:3008/api
    ports:
      - "3004:5173"
    depends_on:
      - ds-registry
    networks:
      - ds-builder-network
    volumes:
      - ./apps/admin:/app
      - /app/node_modules
    command: npm run dev -- --host 0.0.0.0

  # Client Application (Development)
  client:
    build:
      context: ./apps/client
      dockerfile: Dockerfile.dev
    container_name: ds-builder-client-dev
    restart: unless-stopped
    environment:
      VITE_DS_DOCUMENTATION_GENERATOR_API: http://localhost:3006/api
      VITE_DS_GENERATOR_API: http://localhost:3005
      VITE_DS_REGISTRY_API: http://localhost:3008/api
      VITE_NPM_REGISTRY: ${VITE_NPM_REGISTRY}
    ports:
      - "3002:5173"
    depends_on:
      - ds-registry
    networks:
      - ds-builder-network
    volumes:
      - ./apps/client:/app
      - /app/node_modules
    command: npm run dev -- --host 0.0.0.0

  # Generator web library
  generator:
    build:
      context: ./services/ds-generator
      dockerfile: Dockerfile.dev
    container_name: ds-builder-generator-dev
    restart: unless-stopped
    environment:
      NODE_ENV: development
      PORT: 3005
      DS_REGISTRY_URL: http://ds-registry:3008/api
      PUBLISHER_URL: http://publisher:3007
    ports:
      - "3005:3005"
    depends_on:
      - ds-registry
    networks:
      - ds-builder-network
    volumes:
      - ./services/ds-generator:/home/node/app
      - /home/node/app/node_modules
    command: npm run dev

  # Publisher service
  publisher:
    build:
      context: ./services/publisher
      dockerfile: Dockerfile
    container_name: ds-builder-publisher-dev
    restart: unless-stopped
    environment:
      NODE_ENV: development
      PORT: 3007
    ports:
      - "3007:3007"
    networks:
      - ds-builder-network
    command: npm run start

  # Documentation Generator Service
  docs-generator:
    build:
      context: ./services/ds-documentation-generator
      dockerfile: Dockerfile.dev
    container_name: ds-documentation-generator-dev
    environment:
      NODE_ENV: development
      PORT: 3006
      DS_REGISTRY_URL: http://ds-registry:3008/api
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      AWS_ENDPOINT: ${AWS_ENDPOINT}
      AWS_REGION: ${AWS_REGION}
      AWS_S3_BUCKET: ${AWS_S3_BUCKET}
    ports:
      - "3006:3006"
    volumes:
      - docs_output:/home/node/app/output
    networks:
      - ds-builder-network
    command: npm run start:dev

volumes:
  postgres_registry_data_dev:
    driver: local
  docs_output:
    driver: local

networks:
  ds-builder-network:
    driver: bridge
